<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place New Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="ambient-bg">
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>
  <div class="grain"></div>
  <div class="food-particles"></div>
</div>

<nav class="topnav">
    <div class="topnav__left">
        <a class="topnav__back" onclick="history.back()" title="Go back">←</a>
        <a href="{{ url_for('home') }}" class="logo">Bhojan<span>.com</span></a>
    </div>
    <div class="topnav__links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('dashboard') }}">Chat</a>
        <a href="{{ url_for('place_order') }}">New Order</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>

<div class="form-page">
    <div class="form-card glass-card glow-ring">
        <p class="eyebrow" style="animation:none; opacity:1;">🍽️ New order</p>
        <h2 class="page-title" style="opacity:1; animation:none;">Place a New Order</h2>
        <p class="page-sub" style="opacity:1; animation:none; margin-bottom: 1.2rem;">Fill this in and we'll get cooking right away.</p>

        <form method="POST" action="{{ url_for('place_order') }}">
            <div class="form-group">
                <label for="order-name">Your name</label>
                <input type="text" id="order-name" name="Customer_name" placeholder="Your Name" required>
            </div>

            <div class="field">
                <label class="field-label">🌶️ Spice Level</label>
                <div class="chip-group">
                    <input class="chip-input" type="radio" name="Spicy_Level" id="ord-spice-mild" value="Mild" checked>
                    <label class="chip-label" for="ord-spice-mild">Mild</label>
                    <input class="chip-input" type="radio" name="Spicy_Level" id="ord-spice-medium" value="Medium">
                    <label class="chip-label" for="ord-spice-medium">Medium</label>
                    <input class="chip-input" type="radio" name="Spicy_Level" id="ord-spice-spicy" value="Spicy">
                    <label class="chip-label" for="ord-spice-spicy">Spicy</label>
                </div>
            </div>

            <div class="field">
                <label class="field-label">🍬 Sweetness</label>
                <div class="chip-group">
                    <input class="chip-input" type="radio" name="Sweetness" id="ord-sweet-low" value="Low" checked>
                    <label class="chip-label" for="ord-sweet-low">Low</label>
                    <input class="chip-input" type="radio" name="Sweetness" id="ord-sweet-med" value="Medium">
                    <label class="chip-label" for="ord-sweet-med">Medium</label>
                    <input class="chip-input" type="radio" name="Sweetness" id="ord-sweet-high" value="High">
                    <label class="chip-label" for="ord-sweet-high">High</label>
                </div>
            </div>

            <div class="form-group">
                <label for="order-allergies">Allergies (if any)</label>
                <input type="text" id="order-allergies" name="Allergies" placeholder="e.g. Peanuts, Dairy">
            </div>

            <div class="form-group">
                <label for="order-note">Special note</label>
                <input type="text" id="order-note" name="Customer_message" placeholder="Less oil, Jain, etc.">
            </div>

            <div class="form-group">
                <label for="order-address">Delivery address</label>
                <input type="text" id="order-address" name="Address" placeholder="Room / Floor / Block" required>
                <div class="location-note">
                    <span>📍</span>
                    <span>We only use this to reach your door faster.</span>
                </div>
            </div>

            <button type="submit">Place Order 🍛</button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
