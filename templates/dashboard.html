<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dashboard (Test)</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<div class="ambient-bg">
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="grain"></div>
</div>

<nav class="topnav">
    <div class="topnav__left">
        <a class="topnav__back" onclick="history.back()" title="Go back">←</a>
        <a href="{{ url_for('home') }}" class="logo">Bhojan<span>.com</span></a>
    </div>
    <div class="topnav__links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('dashboard') }}">Chat</a>
        <a href="{{ url_for('place_order') }}">New Order</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>

<div class="page-shell page-shell--wide">
    <h1 class="page-title">Live Chat 💬</h1>
    <p class="page-sub">Talk to our team about your order, anytime.</p>

    <div class="chat-shell">
        <div id="chat-box" class="chat-log">
            {% for m in history %}
            <div class="chat-bubble">
                <div class="chat-avatar">{{ m.username[0]|upper }}</div>
                <div class="chat-bubble__content">
                    <span class="username">{{ m.username }}</span><span class="meta">({{ m.email }}) — {{ m.timestamp.strftime('%H:%M:%S') }}</span>
                    <div class="chat-bubble__text">{{ m.message }}</div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="chat-input-bar">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button id="send-btn">Send 🚀</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
