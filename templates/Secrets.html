<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhojan.com — Taste Preferences</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="ambient-bg">
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>
  <div class="grain"></div>
  <div class="food-particles"></div>
</div>

<nav class="topnav">
  <div class="topnav__left">
    <a class="topnav__back" onclick="history.back()" title="Go back">←</a>
    <a href="{{ url_for('about') }}" class="logo">Bhojan<span>.com</span></a>
  </div>
  <span class="user-badge">👋 {{ current_user.name }}</span>
</nav>

<div class="page-shell page-shell--narrow">
  <p class="eyebrow" style="opacity:1; animation:none;">⚙️ One-time setup</p>
  <h1 class="page-title">Set your taste</h1>
  <p class="page-sub">Takes under a minute. You can change this anytime.</p>

  <form action="{{ url_for('preferences') }}" method="POST">

    <div class="field">
      <label class="field-label">🌶️ Spice</label>
      <div class="chip-group">
        <input class="chip-input" type="radio" name="Spicy_Level" id="spice-none" value="None">
        <label class="chip-label" for="spice-none">None</label>

        <input class="chip-input" type="radio" name="Spicy_Level" id="spice-mild" value="Mild" checked>
        <label class="chip-label" for="spice-mild">Mild</label>

        <input class="chip-input" type="radio" name="Spicy_Level" id="spice-medium" value="Medium">
        <label class="chip-label" for="spice-medium">Medium</label>

        <input class="chip-input" type="radio" name="Spicy_Level" id="spice-hot" value="Hot">
        <label class="chip-label" for="spice-hot">Hot</label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">🍬 Sweetness</label>
      <div class="chip-group">
        <input class="chip-input" type="radio" name="Sweetness" id="sweet-none" value="None">
        <label class="chip-label" for="sweet-none">None</label>

        <input class="chip-input" type="radio" name="Sweetness" id="sweet-low" value="Low" checked>
        <label class="chip-label" for="sweet-low">Light</label>

        <input class="chip-input" type="radio" name="Sweetness" id="sweet-med" value="Medium">
        <label class="chip-label" for="sweet-med">Balanced</label>

        <input class="chip-input" type="radio" name="Sweetness" id="sweet-high" value="High">
        <label class="chip-label" for="sweet-high">Sweet</label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">⚠️ Allergies</label>
      <div class="chip-group" id="allergy-chips">
        <input class="chip-input warn" type="checkbox" name="allergy_gluten" id="a-gluten" value="Gluten">
        <label class="chip-label" for="a-gluten">Gluten</label>

        <input class="chip-input warn" type="checkbox" name="allergy_dairy" id="a-dairy" value="Dairy">
        <label class="chip-label" for="a-dairy">Dairy</label>

        <input class="chip-input warn" type="checkbox" name="allergy_nuts" id="a-nuts" value="Tree Nuts">
        <label class="chip-label" for="a-nuts">Nuts</label>

        <input class="chip-input warn" type="checkbox" name="allergy_egg" id="a-egg" value="Egg">
        <label class="chip-label" for="a-egg">Egg</label>

        <input class="chip-input warn" type="checkbox" name="allergy_onion" id="a-onion" value="Onion/Garlic">
        <label class="chip-label" for="a-onion">Onion/Garlic</label>

        <input class="chip-input warn" type="checkbox" name="allergy_soy" id="a-soy" value="Soy">
        <label class="chip-label" for="a-soy">Soy</label>
      </div>
      <input type="hidden" name="Allergies" id="allergies-combined">
    </div>

    <div class="field">
      <label class="field-label" for="customer-name">👤 Name</label>
      <input type="text" id="customer-name" name="Customer_name" value="{{ current_user.name }}" required>
    </div>

    <div class="field">
      <label class="field-label" for="customer-address">📍 Address</label>
      <input type="text" id="customer-address" name="Address" placeholder="Room / Floor / Block" required>
      <div class="location-note">
        <span class="icon">🛰️</span>
        <span>We only use this to reach your door faster — your live location is tracked at the moment you place an order, not before.</span>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="special-note">✍️ Anything else?</label>
      <textarea name="Customer_message" id="special-note" placeholder="Less oil, Jain, allergies not listed above..."></textarea>
    </div>

    <button type="submit" class="btn-submit">Save &amp; continue →</button>

  </form>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
